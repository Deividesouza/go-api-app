name: CI Pipeline - Build and Push

#1. trigger the workflow on push to main branch
on:
  push:
    branches:
      - main
#2. define the jobs to run in the workflow
jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read

  #3. define the steps to execute in the job
    steps:
    - name: checkout code
      uses: actions/checkout@v4
    - name: Login on Github Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ghcr.io/deividesouza/go-api-app:${{ github.sha }}
    - name: Checkout do Repositório de Manifestos
      uses: actions/checkout@v4
      with:
          repository: deividesouza/go-api-manifests 
          path: manifests-repo                      
          token: ${{ secrets.GITOPS_TOKEN }}        
    - name: att tag image in deployment.yaml
      run: |
          sed -i "s|image: ghcr.io/deividesouza/go-api-app:.*|image: ghcr.io/deividesouza/go-api-app:${{ github.sha }}|g" manifests-repo/k8s/deployment.yaml
      
    - name: Commit e Push the changes manifests
      run: |
          cd manifests-repo
          git config --global user.name "GitHub Actions CI"
          git config --global user.email "actions@github.com"
          git add k8s/deployment.yaml
          git commit -m "chore: atualiza tag da imagem para ${{ github.sha }}"
          git push